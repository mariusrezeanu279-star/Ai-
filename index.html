<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Studio Pro – Final Plus</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; font-family:-apple-system, system-ui, sans-serif; height:100vh; display:flex; flex-direction:column; }
    #header { padding:10px; background:#161b22; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
    #header h1 { font-size:18px; font-weight:bold; }
    #status { font-size:12px; color:#8b949e; }
    #settings-panel { background:#161b22; border-bottom:1px solid #30363d; padding:8px 12px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; flex-shrink:0; }
    .ctrl { background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:6px 10px; color:white; flex:1; min-width:80px; }
    .btn-main { background:#7c3aed; border:none; border-radius:6px; padding:6px 14px; color:white; cursor:pointer; font-weight:bold; }
    .btn-main:disabled { opacity:0.5; }
    .btn-secondary { background:#30363d; border:none; border-radius:6px; padding:6px 12px; color:white; cursor:pointer; }
    #custom-url-wrap { display:none; flex:2; }
    .tab-bar { display:flex; border-bottom:1px solid #30363d; background:#0d1117; flex-shrink:0; overflow-x:auto; }
    .tab-btn { flex:1; text-align:center; padding:8px; background:#161b22; border:none; border-bottom:2px solid transparent; color:#8b949e; cursor:pointer; min-width:70px; }
    .tab-btn.active { border-bottom-color:#7c3aed; color:white; background:#0d1117; }
    .tab-panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
    .tab-panel.active { display:flex; }
    #chat-box { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
    .msg { max-width:85%; padding:8px 12px; border-radius:12px; word-break:break-word; }
    .msg.user { align-self:flex-end; background:#7c3aed; border-bottom-right-radius:4px; position:relative; }
    .msg.user .edit-btn { position:absolute; top:-10px; right:-10px; background:#30363d; border:none; border-radius:4px; padding:2px 6px; font-size:10px; cursor:pointer; color:#8b949e; display:none; }
    .msg.user:hover .edit-btn { display:block; }
    .msg.ai { align-self:flex-start; background:#21262d; border-bottom-left-radius:4px; }
    .msg.ai.thinking { opacity:0.6; }
    .msg.ai.error { background:#2a1217; border:1px solid #f87171; color:#f87171; }
    .input-area { display:flex; gap:8px; padding:8px; border-top:1px solid #30363d; background:#161b22; flex-shrink:0; align-items:center; }
    .input-area textarea { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:20px; padding:8px 12px; resize:none; height:40px; color:white; font-size:14px; }
    .file-btn { background:#30363d; padding:8px; border-radius:20px; cursor:pointer; display:flex; align-items:center; }
    .panel-grid { display:flex; flex-direction:column; gap:12px; padding:12px; flex:1; overflow-y:auto; }
    .card { background:#161b22; border-radius:12px; padding:16px; border:1px solid #30363d; }
    #toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#161b22; padding:8px 20px; border-radius:40px; border:1px solid #30363d; opacity:0; transition:0.3s; z-index:999; white-space:nowrap; }
    #toast.show { opacity:1; }
    #file-status { font-size:11px; color:#8b949e; align-self:center; }
    #stop-btn { background:#ef4444; border:none; border-radius:6px; padding:6px 14px; color:white; cursor:pointer; display:none; font-weight:bold; }
  </style>
</head>
<body>

<div id="header">
  <h1>🛸 AI Pro</h1>
  <span id="status">🔑 No Key</span>
</div>

<div id="settings-panel">
  <select id="provider-select" class="ctrl" style="flex:1.5;">
    <option value="featherless" data-url="https://api.featherless.ai/v1">Featherless.ai</option>
    <option value="venice" data-url="https://api.venice.ai/api/v1">Venice.ai</option>
    <option value="custom" data-url="">Custom URL</option>
  </select>
  <input type="password" id="key-input" class="ctrl" placeholder="API Key..." style="flex:2;">
  <button class="btn-main" id="save-key-btn">Save Key</button>
  <div id="custom-url-wrap"><input type="text" id="custom-url" class="ctrl" placeholder="https://api.example.com/v1"></div>
  <input type="text" id="model-search" placeholder="🔍 Filter models..." style="background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:6px 10px; color:white; width:100%; display:none;">
  <select id="model-select" class="ctrl" style="flex:2;">
    <option value="">— Select Model —</option>
  </select>
  <button class="btn-secondary" id="load-models-btn">📥 Models</button>
  <button class="btn-secondary" id="load-more-btn" style="display:none;">➕ More</button>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="chat">💬 Chat</button>
  <button class="tab-btn" data-tab="image">🎨 Image</button>
  <button class="tab-btn" data-tab="edit">✏️ Edit</button>
  <button class="tab-btn" data-tab="combine">🧩 Combine</button>
  <button class="tab-btn" data-tab="video">🎬 Video</button>
</div>

<!-- CHAT TAB -->
<div id="chat-tab" class="tab-panel active">
  <div id="chat-box">
    <div style="text-align:center; color:#8b949e; padding:20px;">Add API key, load a model, and start chatting.</div>
  </div>
  <div id="upload-controls" style="padding:4px 8px; background:#0d1117; border-top:1px solid #30363d; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
    <input type="file" id="vision-file" accept="image/*" style="flex:1; min-width:100px; background:#161b22; border:1px solid #30363d; border-radius:6px; padding:4px; color:#e6edf3;">
    <span id="file-status">No file</span>
  </div>
  <div class="input-area">
    <textarea id="chat-input" placeholder="Ask about the image..."></textarea>
    <button class="btn-main" id="send-btn">Send</button>
    <button id="stop-btn">Stop</button>
  </div>
</div>

<!-- IMAGE GENERATE -->
<div id="image-tab" class="tab-panel">
  <div class="panel-grid">
    <div class="card">
      <textarea id="img-prompt" placeholder="Describe the image..." style="width:100%; min-height:60px;"></textarea>
      <div class="row">
        <select id="img-size" style="flex:1;">
          <option value="1024x1024">1024x1024</option>
          <option value="1536x1024">1536x1024 (16:9)</option>
          <option value="1024x1536">1024x1536 (9:16)</option>
        </select>
        <button class="btn-main" id="img-gen-btn">Generate</button>
      </div>
    </div>
    <div id="img-result" class="card" style="min-height:150px; text-align:center; color:#8b949e; display:flex; align-items:center; justify-content:center;">
      Image appears here
    </div>
  </div>
</div>

<!-- IMAGE EDIT -->
<div id="edit-tab" class="tab-panel">
  <div class="panel-grid">
    <div class="card">
      <div class="upload-box" id="edit-upload">Upload Image to Edit</div>
      <input type="file" id="edit-file-input" style="display:none;">
      <textarea id="edit-prompt" placeholder="Describe the change (e.g., 'Make it look like a cartoon')" style="width:100%; min-height:60px; margin-top:10px;"></textarea>
      <button class="btn-main" id="edit-btn" style="margin-top:8px;">Edit Image</button>
    </div>
    <div id="edit-result" class="card" style="min-height:150px; text-align:center; color:#8b949e; display:flex; align-items:center; justify-content:center;">
      Edited Image appears here
    </div>
  </div>
</div>

<!-- IMAGE COMBINE -->
<div id="combine-tab" class="tab-panel">
  <div class="panel-grid">
    <div class="card">
      <p style="margin-bottom:8px;">Add up to 3 images</p>
      <div class="row" id="combine-upload-area">
        <div class="upload-box" id="combine-upload1">Image 1</div>
        <div class="upload-box" id="combine-upload2">Image 2</div>
        <div class="upload-box" id="combine-upload3">Image 3</div>
      </div>
      <input type="file" id="combine-file-input" style="display:none;">
      <textarea id="combine-prompt" placeholder="Describe how they should combine..." style="width:100%; min-height:60px; margin-top:10px;"></textarea>
      <button class="btn-main" id="combine-btn" style="margin-top:8px;">Combine Images</button>
    </div>
    <div id="combine-result" class="card" style="min-height:150px; text-align:center; color:#8b949e; display:flex; align-items:center; justify-content:center;">
      Combined Image appears here
    </div>
  </div>
</div>

<!-- VIDEO -->
<div id="video-tab" class="tab-panel">
  <div class="panel-grid">
    <div class="card">
      <textarea id="vid-prompt" placeholder="Describe the video..." style="width:100%; min-height:60px;"></textarea>
      <button class="btn-main" id="vid-gen-btn">Generate Video (1-2 min)</button>
    </div>
    <div id="vid-result" class="card" style="min-height:150px; text-align:center; color:#8b949e; display:flex; align-items:center; justify-content:center;">
      Video appears here
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ===== STATE =====
  let apiKey = localStorage.getItem('api_key') || '';
  let baseUrl = 'https://api.featherless.ai/v1';
  let currentProvider = 'featherless';
  let currentModel = '';
  let allModels = [];
  let page = 1;
  let hasMore = true;
  let chatHistory = [];
  let uploadedFileBase64 = null;
  let uploadedFileName = '';
  let uploadedFileType = '';

  // Edit state
  let editFileBase64 = null;
  let combineFilesBase64 = [];

  // ===== ABORT CONTROLLER =====
  let abortController = null;

  // ===== PROXY =====
  const PROXY = 'https://corsproxy.io/?';

  // ===== TOAST =====
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ===== API CALLER =====
  async function callAPI(endpoint, body, onChunk) {
    const targetUrl = baseUrl.endsWith('/') ? baseUrl.slice(0, -1) : baseUrl;
    const fullUrl = PROXY + encodeURIComponent(`${targetUrl}/${endpoint}`);
    abortController = new AbortController();
    document.getElementById('stop-btn').style.display = 'block';
    try {
      const res = await fetch(fullUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ ...body, stream: true }),
        signal: abortController.signal
      });
      if (!res.ok) {
        const errText = await res.text();
        throw new Error(errText);
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (line.startsWith('data: ') && line !== 'data: [DONE]') {
            try {
              const json = JSON.parse(line.slice(6));
              const delta = json.choices?.[0]?.delta?.content;
              if (delta && onChunk) onChunk(delta);
            } catch (e) {}
          }
        }
      }
    } catch (e) {
      if (e.name === 'AbortError') {
        throw new Error('Stopped by user');
      } else {
        throw e;
      }
    } finally {
      abortController = null;
      document.getElementById('stop-btn').style.display = 'none';
    }
  }

  // ===== KEY SAVING =====
  document.getElementById('save-key-btn').addEventListener('click', () => {
    const input = document.getElementById('key-input');
    apiKey = input.value.trim();
    if (apiKey) {
      localStorage.setItem('api_key', apiKey);
      document.getElementById('status').textContent = '✅ Key Saved';
      toast('Key saved permanently!');
      input.value = '';
      loadModels(true);
    } else {
      toast('Enter a valid key');
    }
  });

  if (apiKey) {
    document.getElementById('status').textContent = '✅ Key Saved';
    document.getElementById('key-input').placeholder = 'Key already saved';
  }

  // ===== PROVIDER SWITCH =====
  document.getElementById('provider-select').addEventListener('change', function() {
    currentProvider = this.value;
    const opt = this.options[this.selectedIndex];
    baseUrl = currentProvider === 'custom' ? document.getElementById('custom-url').value : opt.dataset.url;
    document.getElementById('custom-url-wrap').style.display = currentProvider === 'custom' ? 'block' : 'none';
    allModels = [];
    renderModelDropdown();
    document.getElementById('load-more-btn').style.display = 'none';
    document.getElementById('model-search').style.display = 'none';
  });

  document.getElementById('custom-url').addEventListener('input', function() {
    if (currentProvider === 'custom') baseUrl = this.value;
  });

  // ===== MODEL LOADING =====
  async function loadModels(reset = true) {
    if (reset) { page = 1; allModels = []; hasMore = true; }
    if (!hasMore && !reset) return;
    const btn = document.getElementById('load-models-btn');
    btn.disabled = true;
    try {
      if (currentProvider === 'featherless') {
        const url = PROXY + encodeURIComponent(`${baseUrl}/models?page=${page}&per_page=100`);
        const resp = await fetch(url, { headers: { 'Authorization': `Bearer ${apiKey}` } });
        if (!resp.ok) throw new Error('Failed to fetch');
        const data = await resp.json();
        const newModels = data.data || [];
        if (reset) allModels = [];
        allModels.push(...newModels);
        hasMore = newModels.length === 100;
        document.getElementById('model-search').style.display = 'block';
        if (reset) {
          const top10 = [
            { id: 'huihui-ai/Llama-3.3-70B-Instruct-abliterated', name: 'Llama 3.3 70B Abliterated (Top)' },
            { id: 'cognitivecomputations/dolphin-2.9-llama3-70b', name: 'Dolphin 2.9 Llama3 70B' },
            { id: 'Qwen/Qwen2.5-72B-Instruct', name: 'Qwen 2.5 72B (Vision)' },
            { id: 'deepseek-ai/DeepSeek-V2.5-1210', name: 'DeepSeek V2.5' },
            { id: 'meta-llama/Meta-Llama-3.1-405B-Instruct', name: 'Llama 3.1 405B' },
            { id: 'Qwen/Qwen2.5-14B-Instruct', name: 'Qwen 2.5 14B' },
            { id: 'NousResearch/Hermes-2-Pro-Llama-3-8B', name: 'Hermes 2 Pro Llama 3 8B' },
            { id: 'huihui-ai/Mistral-Small-24B-Instruct-2501-abliterated', name: 'Mistral Small 24B Abliterated' },
            { id: 'cognitivecomputations/dolphin-2.9.1-mistral-7b', name: 'Dolphin 2.9.1 Mistral 7B' },
            { id: 'meta-llama/Meta-Llama-3.3-70B-Instruct', name: 'Llama 3.3 70B (Standard)' }
          ];
          allModels = [...top10, ...allModels];
        }
      } else if (currentProvider === 'venice') {
        const types = ['text', 'image', 'video'];
        let allVeniceModels = [];
        for (const t of types) {
          const typeUrl = PROXY + encodeURIComponent(`${baseUrl}/models?type=${t}`);
          const resp = await fetch(typeUrl, { headers: { 'Authorization': `Bearer ${apiKey}` } });
          if (resp.ok) {
            const data = await resp.json();
            const models = data.data || [];
            models.forEach(m => { m._type = t; });
            allVeniceModels.push(...models);
          }
        }
        allModels = reset ? allVeniceModels : [...allModels, ...allVeniceModels];
        hasMore = false;
        document.getElementById('model-search').style.display = 'none';
      } else {
        allModels = [{ id: 'default', name: 'Default Model' }];
        document.getElementById('model-search').style.display = 'none';
      }
      renderModelDropdown();
      document.getElementById('load-more-btn').style.display = hasMore ? 'inline-block' : 'none';
      toast(reset ? `Loaded ${allModels.length} models` : `Added more models`);
    } catch (e) {
      toast('Error loading models: ' + e.message);
      if (allModels.length === 0) {
        allModels = [{ id: 'llama-3.3-70b', name: 'Llama 3.3 70B (Fallback)' }];
        renderModelDropdown();
      }
    } finally {
      btn.disabled = false;
    }
  }

  function renderModelDropdown() {
    const select = document.getElementById('model-select');
    select.innerHTML = '<option value="">— Select Model —</option>';
    allModels.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      let label = m.name || m.id;
      if (m._type) label += ` [${m._type}]`;
      opt.textContent = label;
      select.appendChild(opt);
    });
  }

  document.getElementById('load-models-btn').addEventListener('click', () => loadModels(true));
  document.getElementById('load-more-btn').addEventListener('click', () => { page++; loadModels(false); });
  document.getElementById('model-select').addEventListener('change', (e) => { 
    currentModel = e.target.value;
    if (currentModel) loadChatHistoryForModel(currentModel);
  });

  // ===== SEARCH BAR =====
  let searchTimeout;
  document.getElementById('model-search').addEventListener('input', function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const term = this.value.toLowerCase();
      const select = document.getElementById('model-select');
      const filtered = allModels.filter(m => 
        (m.name || m.id).toLowerCase().includes(term)
      );
      select.innerHTML = '<option value="">— Select Model —</option>';
      filtered.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        let label = m.name || m.id;
        if (m._type) label += ` [${m._type}]`;
        opt.textContent = label;
        select.appendChild(opt);
      });
    }, 150);
  });

  // ===== PER-MODEL CHAT HISTORY =====
  function loadChatHistoryForModel(modelId) {
    const key = `chatHistory_${modelId}`;
    const saved = localStorage.getItem(key);
    if (saved) {
      chatHistory = JSON.parse(saved);
    } else {
      chatHistory = [];
    }
    renderChatMessages();
  }

  function saveChatHistoryForModel(modelId) {
    const key = `chatHistory_${modelId}`;
    localStorage.setItem(key, JSON.stringify(chatHistory));
  }

  function deleteChatHistoryForModel(modelId) {
    const key = `chatHistory_${modelId}`;
    localStorage.removeItem(key);
    chatHistory = [];
    renderChatMessages();
    toast('History deleted for this model');
  }

  function renderChatMessages() {
    const box = document.getElementById('chat-box');
    box.innerHTML = '';
    if (chatHistory.length === 0) {
      box.innerHTML = `<div style="text-align:center; color:#8b949e; padding:20px;">No messages for this model yet. <button onclick="deleteChatHistoryForModel('${currentModel}')" style="background:#ef4444; border:none; border-radius:6px; padding:4px 10px; color:white; font-size:12px; margin-top:8px;">🗑️ Delete History</button></div>`;
      return;
    }
    chatHistory.forEach((msg, index) => {
      const div = document.createElement('div');
      div.className = `msg ${msg.role}`;
      if (msg.role === 'user') {
        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.textContent = '✏️';
        editBtn.onclick = () => {
          document.getElementById('chat-input').value = msg.content;
          // Remove this message and all after it
          chatHistory = chatHistory.slice(0, index);
          saveChatHistoryForModel(currentModel);
          renderChatMessages();
        };
        div.appendChild(editBtn);
      }
      const textDiv = document.createElement('div');
      textDiv.textContent = msg.content;
      div.appendChild(textDiv);
      box.appendChild(div);
    });
    // Delete history button
    const deleteBtn = document.createElement('div');
    deleteBtn.style.textAlign = 'center';
    deleteBtn.style.marginTop = '10px';
    deleteBtn.innerHTML = `<button onclick="deleteChatHistoryForModel('${currentModel}')" style="background:#ef4444; border:none; border-radius:6px; padding:6px 14px; color:white; font-size:12px; cursor:pointer;">🗑️ Delete All History</button>`;
    box.appendChild(deleteBtn);
    box.scrollTop = box.scrollHeight;
  }

  // ===== CHAT WITH VISION =====
  document.getElementById('send-btn').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });

  document.getElementById('stop-btn').addEventListener('click', () => {
    if (abortController) {
      abortController.abort();
      abortController = null;
      document.getElementById('stop-btn').style.display = 'none';
      toast('Stopped by user');
    }
  });

  document.getElementById('vision-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      toast('File too large (max 10MB)');
      return;
    }
    uploadedFileName = file.name;
    uploadedFileType = file.type;
    const reader = new FileReader();
    reader.onload = function(ev) {
      uploadedFileBase64 = ev.target.result.split(',')[1];
      document.getElementById('file-status').textContent = `📎 Loaded: ${uploadedFileName}`;
      toast('File loaded! Ask about it.');
    };
    reader.onerror = function() {
      toast('Error reading file');
    };
    reader.readAsDataURL(file);
  });

  function addMessage(role, text, className = '') {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `msg ${role} ${className}`;
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  async function sendChat() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text && !uploadedFileBase64) { toast('Type a message or upload a file'); return; }
    if (!apiKey) { toast('Save API key first'); return; }
    if (!currentModel) { toast('Select a model'); return; }
    input.value = '';

    let userMessage = text || 'Analyze this file.';
    let userContent = [{ type: 'text', text: userMessage }];
    if (uploadedFileBase64 && uploadedFileType.startsWith('image/')) {
      userContent.push({
        type: 'image_url',
        image_url: { url: `data:${uploadedFileType};base64,${uploadedFileBase64}` }
      });
    } else if (uploadedFileBase64 && uploadedFileType.startsWith('video/')) {
      userContent.push({
        type: 'text',
        text: `\n[Video file: ${uploadedFileName}] The video is encoded in Base64. Please analyze it.`
      });
    }

    addMessage('user', uploadedFileName ? `📎 ${uploadedFileName}\n\n${userMessage}` : userMessage);
    chatHistory.push({ role: 'user', content: userContent });
    const botDiv = addMessage('ai', '⏳ Connecting...', 'thinking');

    try {
      let currentReply = '';
      const onChunk = (delta) => {
        currentReply += delta;
        botDiv.textContent = currentReply;
        botDiv.classList.remove('thinking');
        botDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      };
      const messages = [
        { role: 'system', content: 'You are a forensic AI. Analyze images/videos and provide detailed insights.' },
        ...chatHistory.slice(-10).map(m => ({
          role: m.role,
          content: Array.isArray(m.content) ? m.content : [{ type: 'text', text: m.content }]
        }))
      ];
      const data = await callAPI('chat/completions', {
        model: currentModel,
        messages: messages,
        max_tokens: 2000
      }, onChunk);
      // If we get here without streaming, fallback
      if (!currentReply) {
        const reply = data.choices[0].message.content;
        botDiv.textContent = reply;
        chatHistory.push({ role: 'assistant', content: [{ type: 'text', text: reply }] });
      } else {
        chatHistory.push({ role: 'assistant', content: [{ type: 'text', text: currentReply }] });
      }
      saveChatHistoryForModel(currentModel);
    } catch (e) {
      if (e.message === 'Stopped by user') {
        botDiv.textContent += ' (stopped)';
      } else {
        botDiv.textContent = 'Error: ' + e.message;
        botDiv.className = 'msg ai error';
      }
    }
    uploadedFileBase64 = null;
    uploadedFileName = '';
    document.getElementById('file-status').textContent = 'No file';
    document.getElementById('stop-btn').style.display = 'none';
  }

  // ===== IMAGE GENERATION =====
  document.getElementById('img-gen-btn').addEventListener('click', async () => {
    const prompt = document.getElementById('img-prompt').value.trim();
    if (!prompt) { toast('Enter a prompt'); return; }
    if (!apiKey) { toast('Save API key first'); return; }
    if (!currentModel) { toast('Select an image model'); return; }
    const size = document.getElementById('img-size').value;
    const [w, h] = size.split('x').map(Number);
    const res = document.getElementById('img-result');
    res.innerHTML = '⏳ Generating...';
    try {
      let data;
      if (currentProvider === 'venice') {
        data = await callAPI('image/generate', {
          model: currentModel,
          prompt: prompt,
          width: w, height: h,
          format: 'webp'
        });
        const b64 = data.images?.[0];
        if (b64) res.innerHTML = `<img src="data:image/webp;base64,${b64}" style="max-width:100%; border-radius:8px;">`;
        else throw new Error('No image');
      } else {
        data = await callAPI('images/generations', {
          model: currentModel,
          prompt: prompt,
          n: 1,
          size: '1024x1024'
        });
        const url = data.data?.[0]?.url;
        if (url) res.innerHTML = `<img src="${url}" style="max-width:100%; border-radius:8px;">`;
        else throw new Error('No image');
      }
    } catch (e) { res.innerHTML = `<div style="color:#f87171;">${e.message}</div>`; }
  });

  // ===== IMAGE EDIT =====
  document.getElementById('edit-upload').addEventListener('click', () => document.getElementById('edit-file-input').click());
  document.getElementById('edit-file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      editFileBase64 = ev.target.result.split(',')[1];
      const box = document.getElementById('edit-upload');
      box.innerHTML = `<img src="data:image/png;base64,${editFileBase64}">`;
      box.classList.add('has-img');
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('edit-btn').addEventListener('click', async () => {
    if (!editFileBase64) { toast('Upload an image first'); return; }
    const prompt = document.getElementById('edit-prompt').value.trim();
    if (!prompt) { toast('Describe the change'); return; }
    const res = document.getElementById('edit-result');
    res.innerHTML = '⏳ Editing...';
    try {
      const data = await callAPI('image/edit', {
        model: currentModel || 'lustify-sdxl',
        prompt: prompt,
        image: editFileBase64
      });
      const b64 = data.images?.[0];
      if (b64) res.innerHTML = `<img src="data:image/webp;base64,${b64}" style="max-width:100%; border-radius:8px;">`;
      else throw new Error('No image');
    } catch (e) { res.innerHTML = `<div style="color:#f87171;">${e.message}</div>`; }
  });

  // ===== IMAGE COMBINE =====
  let combineFilesBase64 = [];
  document.querySelectorAll('#combine-upload-area .upload-box').forEach((box, index) => {
    box.addEventListener('click', () => {
      const input = document.getElementById('combine-file-input');
      input.dataset.target = index;
      input.click();
    });
  });
  document.getElementById('combine-file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const target = parseInt(e.target.dataset.target);
    const reader = new FileReader();
    reader.onload = (ev) => {
      const b64 = ev.target.result.split(',')[1];
      combineFilesBase64[target] = b64;
      const box = document.querySelectorAll('#combine-upload-area .upload-box')[target];
      box.innerHTML = `<img src="data:image/png;base64,${b64}">`;
      box.classList.add('has-img');
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('combine-btn').addEventListener('click', async () => {
    const images = combineFilesBase64.filter(Boolean);
    if (images.length < 2) { toast('Upload at least 2 images'); return; }
    const prompt = document.getElementById('combine-prompt').value.trim();
    if (!prompt) { toast('Describe how to combine them'); return; }
    const res = document.getElementById('combine-result');
    res.innerHTML = '⏳ Combining...';
    try {
      const data = await callAPI('image/combine', {
        model: currentModel || 'lustify-sdxl',
        prompt: prompt,
        images: images
      });
      const b64 = data.images?.[0];
      if (b64) res.innerHTML = `<img src="data:image/webp;base64,${b64}" style="max-width:100%; border-radius:8px;">`;
      else throw new Error('No image');
    } catch (e) { res.innerHTML = `<div style="color:#f87171;">${e.message}</div>`; }
  });

  // ===== VIDEO GENERATION =====
  document.getElementById('vid-gen-btn').addEventListener('click', async () => {
    const prompt = document.getElementById('vid-prompt').value.trim();
    if (!prompt) { toast('Enter a prompt'); return; }
    if (currentProvider !== 'venice') { toast('Video works best with Venice.ai'); return; }
    const res = document.getElementById('vid-result');
    res.innerHTML = '⏳ Generating video (1-2 min)...';
    try {
      const data = await callAPI('video/generate', {
        model: currentModel || 'kling-v3',
        prompt: prompt,
        aspect_ratio: '16:9',
        duration: 5
      });
      let url = data.video_url;
      if (!url && data.video_id) {
        res.innerHTML += '<div style="color:#fbbf24;">🔄 Polling...</div>';
        for (let i=0; i<10; i++) {
          await new Promise(r => setTimeout(r, 5000));
          const status = await callAPI('video/status', { video_id: data.video_id });
          if (status.status === 'completed' && status.video_url) { url = status.video_url; break; }
          if (status.status === 'failed') throw new Error('Video failed');
        }
      }
      if (url) res.innerHTML = `<video controls src="${url}" style="max-width:100%; max-height:400px; border-radius:8px;"></video>`;
      else throw new Error('Video not ready');
    } catch (e) { res.innerHTML = `<div style="color:#f87171;">${e.message}</div>`; }
  });

  // ===== TABS =====
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`${btn.dataset.tab}-tab`).classList.add('active');
    });
  });

  // ===== INIT =====
  if (apiKey) loadModels(true);
  toast('💡 Add key → Load Models → Start');
</script>
</body>
</html>
