<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Studio – Full</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; font-family:-apple-system, system-ui, sans-serif; height:100vh; display:flex; flex-direction:column; }
    #header { padding:12px; background:#161b22; border-bottom:1px solid #30363d; display:flex; align-items:center; gap:10px; }
    #header h1 { font-size:18px; }
    #chat-box { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
    .msg { max-width:85%; padding:8px 14px; border-radius:16px; line-height:1.4; word-break:break-word; }
    .msg.user { align-self:flex-end; background:#7c3aed; border-bottom-right-radius:4px; }
    .msg.bot { align-self:flex-start; background:#21262d; border-bottom-left-radius:4px; }
    .msg.thinking { opacity:0.6; }
    .msg.error { background:#2a1217; border:1px solid #f87171; color:#f87171; }
    #input-area { display:flex; gap:8px; padding:10px; background:#161b22; border-top:1px solid #30363d; }
    textarea { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:20px; padding:10px 14px; color:white; resize:none; font-size:14px; height:44px; }
    button { background:#7c3aed; border:none; border-radius:20px; padding:0 18px; color:white; font-weight:bold; cursor:pointer; }
    button:disabled { opacity:0.5; }
    #toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#161b22; padding:8px 20px; border-radius:40px; border:1px solid #30363d; opacity:0; transition:0.2s; }
    #toast.show { opacity:1; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 0.8s linear infinite; display:inline-block; }
    .tab-bar { display:flex; gap:0; border-bottom:1px solid #30363d; }
    .tab { flex:1; text-align:center; padding:10px; background:#161b22; cursor:pointer; border-bottom:2px solid transparent; }
    .tab.active { border-bottom-color:#7c3aed; background:#0d1117; }
    .panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
    .panel.active { display:flex; }
    #settings-panel { padding:16px; background:#0d1117; border-bottom:1px solid #30363d; display:flex; flex-direction:column; gap:8px; }
    .setting-row { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
    .ctrl { background:#21262d; border:1px solid #30363d; border-radius:8px; padding:6px 10px; color:white; }
    #image-panel, #video-panel { padding:16px; gap:12px; overflow-y:auto; }
    input, select, textarea { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:8px 12px; color:white; width:100%; }
  </style>
</head>
<body>

<div id="header">
  <button class="sidebar-btn" id="menuBtn">☰</button>
  <h1>✨ AI Studio</h1>
  <div style="margin-left:auto; font-size:11px; color:#8b949e;" id="status">Ready</div>
</div>

<!-- SETTINGS -->
<div id="settings-panel">
  <div class="setting-row">
    <span style="font-size:12px; font-weight:bold; min-width:60px;">Provider</span>
    <select id="provider-select" class="ctrl" style="flex:1;">
      <option value="featherless" data-url="https://api.featherless.ai/v1">Featherless.ai</option>
      <option value="venice" data-url="https://api.venice.ai/api/v1">Venice.ai</option>
      <option value="custom" data-url="">Custom URL</option>
    </select>
  </div>
  <div class="setting-row">
    <span style="font-size:12px; font-weight:bold; min-width:60px;">API Key</span>
    <input type="password" id="api-key-input" class="ctrl" placeholder="Enter your API key..." style="flex:1;">
  </div>
  <div id="custom-url-wrap" style="display:none;">
    <input type="text" id="custom-url" class="ctrl" placeholder="https://your-api.com/v1" style="width:100%;">
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <button id="load-models-btn" style="font-size:12px; padding:4px 12px;">📥 Load Models</button>
    <select id="model-select" class="ctrl" style="flex:1; min-width:140px;">
      <option value="">— select a model —</option>
    </select>
  </div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <div class="tab active" data-tab="chat">💬 Chat</div>
  <div class="tab" data-tab="image">🎨 Image</div>
  <div class="tab" data-tab="video">🎬 Video</div>
</div>

<!-- CHAT -->
<div id="chat-panel" class="panel active">
  <div id="chat-box">
    <div style="text-align:center; color:#8b949e; padding:20px;">Select provider, add API key, load models, pick one, and chat.</div>
  </div>
  <div id="input-area">
    <textarea id="chat-input" placeholder="Message..."></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<!-- IMAGE -->
<div id="image-panel" class="panel">
  <input id="img-prompt" placeholder="Describe the image..." style="min-height:60px;">
  <div style="display:flex; gap:10px;">
    <select id="img-size" style="flex:1;">
      <option value="1024x1024">1024x1024</option>
      <option value="1536x1024">1536x1024 (16:9)</option>
      <option value="1024x1536">1024x1536 (9:16)</option>
    </select>
    <button id="img-gen-btn" style="white-space:nowrap;">Generate</button>
  </div>
  <div id="img-result" style="min-height:200px; background:#0d1117; border-radius:12px; border:1px dashed #30363d; display:flex; align-items:center; justify-content:center; color:#8b949e;">Image will appear here</div>
</div>

<!-- VIDEO -->
<div id="video-panel" class="panel">
  <input id="vid-prompt" placeholder="Describe the video..." style="min-height:60px;">
  <button id="vid-gen-btn">Generate Video (1-2 min)</button>
  <div id="vid-result" style="min-height:200px; background:#0d1117; border-radius:12px; border:1px dashed #30363d; display:flex; align-items:center; justify-content:center; color:#8b949e;">Video will appear here</div>
</div>

<div id="toast"></div>

<script>
  // ===== STATE =====
  let apiKey = '';
  let baseUrl = 'https://api.featherless.ai/v1';
  let currentProvider = 'featherless';
  let allModels = [];
  let chatHistory = [];
  let currentModel = '';

  // ===== PROXY =====
  const PROXY = 'https://corsproxy.io/?';

  // ===== DOM REFS =====
  const toastDiv = document.getElementById('toast');
  function toast(msg) { toastDiv.textContent=msg; toastDiv.classList.add('show'); setTimeout(()=>toastDiv.classList.remove('show'),3000); }
  function setStatus(s) { document.getElementById('status').textContent = s; }

  // ===== API CALL =====
  async function callAPI(endpoint, body) {
    const targetUrl = baseUrl.endsWith('/') ? baseUrl.slice(0,-1) : baseUrl;
    const fullUrl = PROXY + encodeURIComponent(`${targetUrl}/${endpoint}`);
    const res = await fetch(fullUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  // ===== LOAD MODELS =====
  async function loadModels() {
    const btn = document.getElementById('load-models-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spin">⟳</span>';
    const select = document.getElementById('model-select');
    select.innerHTML = '<option value="">Loading...</option>';
    try {
      let data;
      if (currentProvider === 'featherless') {
        const resp = await fetch(PROXY + encodeURIComponent(`${baseUrl}/models?per_page=100`), {
          headers: { 'Authorization': `Bearer ${apiKey}` }
        });
        if (!resp.ok) throw new Error('Featherless load failed');
        data = await resp.json();
        allModels = (data.data || []).map(m => ({ id: m.id, name: m.name || m.id }));
      } else if (currentProvider === 'venice') {
        const resp = await fetch(PROXY + encodeURIComponent(`${baseUrl}/models`), {
          headers: { 'Authorization': `Bearer ${apiKey}` }
        });
        if (!resp.ok) throw new Error('Venice load failed');
        data = await resp.json();
        allModels = (data.data || []).map(m => ({ id: m.id, name: m.model_spec?.name || m.id }));
      } else {
        // Custom provider — use defaults
        allModels = [{ id: 'default', name: 'Default Model' }];
      }
      renderModels();
      toast(`✅ ${allModels.length} models loaded`);
    } catch(e) {
      toast(`❌ ${e.message}`);
      allModels = [];
      renderModels();
    } finally {
      btn.disabled = false; btn.innerHTML = '📥 Load Models';
    }
  }

  function renderModels() {
    const select = document.getElementById('model-select');
    select.innerHTML = '<option value="">— select a model —</option>';
    allModels.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      select.appendChild(opt);
    });
    if (allModels.length === 1) select.selectedIndex = 1;
  }

  // ===== SETTINGS UI =====
  document.getElementById('provider-select').addEventListener('change', function() {
    currentProvider = this.value;
    const opt = this.options[this.selectedIndex];
    baseUrl = currentProvider === 'custom' ? document.getElementById('custom-url').value : opt.dataset.url;
    document.getElementById('custom-url-wrap').style.display = currentProvider === 'custom' ? 'block' : 'none';
    allModels = [];
    renderModels();
  });
  document.getElementById('api-key-input').addEventListener('input', function() {
    apiKey = this.value.trim();
    setStatus(apiKey ? '✅ Key set' : '🔑 No key');
    allModels = [];
    renderModels();
  });
  document.getElementById('custom-url').addEventListener('input', function() {
    if (currentProvider === 'custom') baseUrl = this.value;
  });
  document.getElementById('load-models-btn').addEventListener('click', loadModels);
  document.getElementById('model-select').addEventListener('change', function() {
    currentModel = this.value;
  });

  // ===== CHAT =====
  async function sendChat() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    if (!apiKey) { toast('Add an API key first'); return; }
    if (!currentModel) { toast('Select a model first'); return; }
    input.value = '';
    const box = document.getElementById('chat-box');
    const userDiv = document.createElement('div');
    userDiv.className = 'msg user'; userDiv.textContent = text;
    box.appendChild(userDiv);
    chatHistory.push({role:'user', content:text});
    const botDiv = document.createElement('div');
    botDiv.className = 'msg bot thinking'; botDiv.textContent = '⏳ Thinking...';
    box.appendChild(botDiv);
    box.scrollTop = box.scrollHeight;
    try {
      const data = await callAPI('chat/completions', {
        model: currentModel,
        messages: [{role:'system',content:'You are a helpful AI.'}, ...chatHistory.slice(-10)],
        max_tokens: 800
      });
      const reply = data.choices[0].message.content;
      botDiv.className = 'msg bot'; botDiv.textContent = reply;
      chatHistory.push({role:'assistant', content:reply});
    } catch(e) {
      botDiv.className = 'msg error'; botDiv.textContent = '❌ '+e.message;
    }
    box.scrollTop = box.scrollHeight;
  }

  // ===== IMAGE (Supports Venice & Featherless) =====
  async function genImage() {
    const prompt = document.getElementById('img-prompt').value.trim();
    if (!prompt) { toast('Enter a prompt'); return; }
    if (!apiKey) { toast('Add an API key'); return; }
    if (!currentModel) { toast('Select an image model'); return; }
    const btn = document.getElementById('img-gen-btn');
    btn.disabled = true; btn.textContent = '⏳';
    const size = document.getElementById('img-size').value;
    const [w, h] = size.split('x').map(Number);
    const resDiv = document.getElementById('img-result');
    resDiv.innerHTML = '⏳ Generating...';
    try {
      let data;
      if (currentProvider === 'venice') {
        data = await callAPI('image/generate', {
          model: currentModel,
          prompt: prompt,
          width: w, height: h,
          format: 'webp'
        });
        const b64 = data.images?.[0];
        if (b64) resDiv.innerHTML = `<img src="data:image/webp;base64,${b64}" style="max-width:100%; max-height:400px; border-radius:8px;">`;
        else throw new Error('No image');
      } else {
        data = await callAPI('images/generations', {
          model: currentModel,
          prompt: prompt,
          n: 1,
          size: size
        });
        const url = data.data?.[0]?.url;
        if (url) resDiv.innerHTML = `<img src="${url}" style="max-width:100%; max-height:400px; border-radius:8px;">`;
        else throw new Error('No image');
      }
      toast('✅ Image generated');
    } catch(e) { resDiv.innerHTML = `<div style="color:#f87171;">❌ ${e.message}</div>`; }
    finally { btn.disabled = false; btn.textContent = 'Generate'; }
  }

  // ===== VIDEO (Venice only) =====
  async function genVideo() {
    const prompt = document.getElementById('vid-prompt').value.trim();
    if (!prompt) { toast('Enter a prompt'); return; }
    if (!apiKey) { toast('Add an API key'); return; }
    if (currentProvider !== 'venice') { toast('Video works only with Venice.ai'); return; }
    if (!currentModel) { toast('Select a video model (e.g., kling-v3)'); return; }
    const btn = document.getElementById('vid-gen-btn');
    btn.disabled = true; btn.textContent = '⏳';
    const resDiv = document.getElementById('vid-result');
    resDiv.innerHTML = '⏳ Generating video (1-2 min)...';
    try {
      const data = await callAPI('video/generate', {
        model: currentModel,
        prompt: prompt,
        aspect_ratio: '16:9',
        duration: 5
      });
      let vidUrl = data.video_url;
      if (!vidUrl && data.video_id) {
        resDiv.innerHTML += '<div style="color:#fbbf24;">🔄 Polling...</div>';
        for (let i=0; i<10; i++) {
          await new Promise(r=>setTimeout(r,5000));
          const status = await callAPI('video/status', { video_id: data.video_id });
          if (status.status === 'completed' && status.video_url) { vidUrl = status.video_url; break; }
          if (status.status === 'failed') throw new Error('Video failed');
        }
      }
      if (vidUrl) resDiv.innerHTML = `<video controls src="${vidUrl}" style="max-width:100%; max-height:400px; border-radius:8px;"></video>`;
      else throw new Error('Video not ready');
    } catch(e) { resDiv.innerHTML = `<div style="color:#f87171;">❌ ${e.message}</div>`; }
    finally { btn.disabled = false; btn.textContent = 'Generate Video'; }
  }

  // ===== EVENTS =====
  document.getElementById('send-btn').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendChat(); } });
  document.getElementById('img-gen-btn').addEventListener('click', genImage);
  document.getElementById('vid-gen-btn').addEventListener('click', genVideo);

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab+'-panel').classList.add('active');
    });
  });

  // Menu button (just info)
  document.getElementById('menuBtn').addEventListener('click', () => toast('📌 Use tabs for chat, image, video'));

  // ===== INIT =====
  document.getElementById('custom-url-wrap').style.display = 'none';
  setStatus('🔑 Add API key');
  toast('💡 Add key → Load Models → Select model → Chat/Image/Video');
</script>
</body>
</html>
