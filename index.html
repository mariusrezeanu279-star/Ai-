<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Pro - Fallback</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; font-family:-apple-system, system-ui, sans-serif; height:100vh; display:flex; flex-direction:column; }
    #header { padding:10px; background:#161b22; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
    #header h1 { font-size:18px; font-weight:bold; }
    #status { font-size:12px; color:#8b949e; }
    #settings-panel { background:#161b22; border-bottom:1px solid #30363d; padding:8px 12px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; flex-shrink:0; }
    .ctrl { background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:6px 10px; color:white; flex:1; min-width:80px; }
    .btn-main { background:#7c3aed; border:none; border-radius:6px; padding:6px 14px; color:white; cursor:pointer; font-weight:bold; }
    .btn-secondary { background:#30363d; border:none; border-radius:6px; padding:6px 12px; color:white; cursor:pointer; }
    .tab-bar { display:flex; border-bottom:1px solid #30363d; background:#0d1117; flex-shrink:0; }
    .tab-btn { flex:1; text-align:center; padding:8px; background:#161b22; border:none; border-bottom:2px solid transparent; color:#8b949e; cursor:pointer; }
    .tab-btn.active { border-bottom-color:#7c3aed; color:white; background:#0d1117; }
    .tab-panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
    .tab-panel.active { display:flex; }
    #chat-box { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
    .msg { max-width:85%; padding:8px 12px; border-radius:12px; word-break:break-word; }
    .msg.user { align-self:flex-end; background:#7c3aed; border-bottom-right-radius:4px; }
    .msg.ai { align-self:flex-start; background:#21262d; border-bottom-left-radius:4px; }
    .msg.ai.thinking { opacity:0.6; }
    .input-area { display:flex; gap:8px; padding:8px; border-top:1px solid #30363d; background:#161b22; align-items:center; }
    .input-area textarea { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:20px; padding:8px 12px; resize:none; height:40px; color:white; }
    #toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#161b22; padding:8px 20px; border-radius:40px; border:1px solid #30363d; opacity:0; transition:0.3s; z-index:999; }
    #toast.show { opacity:1; }
    .upload-area { padding:8px; border-top:1px solid #30363d; display:flex; gap:8px; align-items:center; background:#0d1117; }
    .upload-area input[type="file"] { flex:1; background:#161b22; border:1px solid #30363d; border-radius:6px; padding:4px 8px; color:white; }
  </style>
</head>
<body>

<div id="header">
  <h1>🛸 AI Pro</h1>
  <span id="status">🔑 No Key</span>
</div>

<div id="settings-panel">
  <input type="password" id="key-input" class="ctrl" placeholder="Featherless API Key..." style="flex:2;">
  <button class="btn-main" id="save-key-btn">Save Key</button>
  <select id="model-select" class="ctrl" style="flex:2;">
    <option value="">— Select Model —</option>
  </select>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="chat">💬 Chat</button>
  <button class="tab-btn" data-tab="image">🎨 Image</button>
  <button class="tab-btn" data-tab="edit">✏️ Edit</button>
  <button class="tab-btn" data-tab="combine">🧩 Combine</button>
  <button class="tab-btn" data-tab="video">🎬 Video</button>
</div>

<!-- CHAT TAB -->
<div id="chat-tab" class="tab-panel active">
  <div id="chat-box">
    <div style="text-align:center; color:#8b949e; padding:20px;">Add your Featherless key and start chatting.</div>
  </div>
  <div class="upload-area">
    <input type="file" id="file-input" accept="*/*">
    <button class="btn-secondary" id="upload-btn">📤 Send File</button>
  </div>
  <div class="input-area">
    <textarea id="chat-input" placeholder="Message..."></textarea>
    <button class="btn-main" id="send-btn">Send</button>
  </div>
</div>

<!-- IMAGE TAB -->
<div id="image-tab" class="tab-panel">
  <div style="padding:20px; text-align:center; color:#8b949e;">Image generation coming soon.</div>
</div>

<!-- EDIT TAB -->
<div id="edit-tab" class="tab-panel">
  <div style="padding:20px; text-align:center; color:#8b949e;">Edit coming soon.</div>
</div>

<!-- COMBINE TAB -->
<div id="combine-tab" class="tab-panel">
  <div style="padding:20px; text-align:center; color:#8b949e;">Combine coming soon.</div>
</div>

<!-- VIDEO TAB -->
<div id="video-tab" class="tab-panel">
  <div style="padding:20px; text-align:center; color:#8b949e;">Video coming soon.</div>
</div>

<div id="toast"></div>

<script>
  // ===== SIMPLE STATE =====
  let apiKey = localStorage.getItem('api_key') || '';
  let currentModel = '';
  let chatHistory = [];
  let isProcessing = false;

  // ===== HARDCODED MODELS (Guaranteed to work) =====
  const models = [
    { id: 'huihui-ai/Llama-3.3-70B-Instruct-abliterated', name: 'Llama 3.3 70B Abliterated' },
    { id: 'Qwen/Qwen2.5-72B-Instruct', name: 'Qwen 2.5 72B (Vision)' },
    { id: 'cognitivecomputations/dolphin-2.9-llama3-70b', name: 'Dolphin 2.9 Llama3 70B' }
  ];

  // ===== TOAST =====
  function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

  // ===== KEY SAVING =====
  document.getElementById('save-key-btn').addEventListener('click', () => {
    const input = document.getElementById('key-input');
    apiKey = input.value.trim();
    if (apiKey) {
      localStorage.setItem('api_key', apiKey);
      document.getElementById('status').textContent = '✅ Key Saved';
      document.getElementById('status').style.color = '#10b981';
      toast('Key saved!');
      input.value = '';
    } else {
      toast('Enter a valid key');
    }
  });

  if (apiKey) {
    document.getElementById('status').textContent = '✅ Key Saved';
    document.getElementById('status').style.color = '#10b981';
    document.getElementById('key-input').placeholder = 'Key already saved';
  }

  // ===== POPULATE MODELS (No API Call) =====
  function populateModels() {
    const select = document.getElementById('model-select');
    select.innerHTML = '<option value="">— Select Model —</option>';
    models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      select.appendChild(opt);
    });
  }
  populateModels();
  document.getElementById('model-select').addEventListener('change', (e) => { currentModel = e.target.value; });

  // ===== TABS (Simple Event Delegation) =====
  document.querySelector('.tab-bar').addEventListener('click', function(e) {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
  });

  // ===== CHAT =====
  document.getElementById('send-btn').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });

  function addMessage(role, text, className = '') {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `msg ${role} ${className}`;
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  async function sendChat() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) { toast('Type a message'); return; }
    if (!apiKey) { toast('Save API key first'); return; }
    if (!currentModel) { toast('Select a model'); return; }
    input.value = '';
    addMessage('user', text);
    chatHistory.push({ role: 'user', content: text });
    const botDiv = addMessage('ai', '⏳ Thinking...', 'thinking');
    isProcessing = true;
    try {
      const PROXY = 'https://corsproxy.io/?';
      const url = PROXY + encodeURIComponent('https://api.featherless.ai/v1/chat/completions');
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: currentModel,
          messages: [{ role: 'system', content: 'You are a helpful AI.' }, ...chatHistory.slice(-10)],
          max_tokens: 800
        })
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      const reply = data.choices[0].message.content;
      botDiv.textContent = reply;
      botDiv.classList.remove('thinking');
      chatHistory.push({ role: 'assistant', content: reply });
    } catch (e) {
      botDiv.textContent = 'Error: ' + e.message;
      botDiv.className = 'msg ai error';
    } finally {
      isProcessing = false;
    }
  }

  // ===== FILE UPLOAD =====
  document.getElementById('upload-btn').addEventListener('click', () => {
    const fileInput = document.getElementById('file-input');
    const file = fileInput.files[0];
    if (!file) { toast('Select a file first'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const content = e.target.result;
      document.getElementById('chat-input').value = `[File: ${file.name}]\n${content}`;
      toast('File loaded into input!');
    };
    reader.readAsText(file);
  });
</script>
</body>
</html>
